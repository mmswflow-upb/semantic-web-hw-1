<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Filter by Cuisine')}"></head>
<body class="page-body">
    <aside th:replace="~{fragments/sidebar :: nav}"></aside>
    <main class="main">
        <h1 class="page-title mb-6">Filter by Cuisine</h1>

        <form method="post" action="/recipes/cuisine" class="inline-form mb-6">
            <label for="cuisine" class="inline-label">Cuisine type:</label>
            <select id="cuisine" name="cuisine" class="select w-52">
                <option value="">-- select --</option>
                <option th:each="ct : ${cuisineTypes}" th:value="${ct.label}" th:text="${ct.label}"
                        th:selected="${ct.label == selectedCuisine}"></option>
            </select>
            <button type="submit" class="btn">Filter</button>
        </form>

        <div th:if="${selectedCuisine != ''}">
            <p class="muted mb-3">
                Results for <strong th:text="${selectedCuisine}"></strong>:
                <span th:text="${recipes.size()}">0</span> recipe(s)
            </p>
            <table class="tbl" th:if="${!recipes.isEmpty()}">
                <thead>
                    <tr class="thead-row">
                        <th class="th">ID</th>
                        <th class="th">Title</th>
                        <th class="th">Cuisine 1</th>
                        <th class="th">Cuisine 2</th>
                        <th class="th">Difficulty</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r, stat : ${recipes}" th:class="${stat.even} ? 'bg-gray-50' : ''">
                        <td class="td">
                            <a th:href="@{/recipes/{id}(id=${r.id})}" th:text="${r.id}" class="link"></a>
                        </td>
                        <td class="td" th:text="${r.title}"></td>
                        <td class="td" th:text="${r.cuisineType1}"></td>
                        <td class="td" th:text="${r.cuisineType2}"></td>
                        <td class="td" th:text="${r.difficulty}"></td>
                    </tr>
                </tbody>
            </table>
            <p class="muted" th:if="${recipes.isEmpty()}">No recipes found for this cuisine.</p>
        </div>
    </main>
</body>
</html>
