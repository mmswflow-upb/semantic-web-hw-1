<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Add User')}"></head>
<body class="page-body">
    <aside th:replace="~{fragments/sidebar :: nav}"></aside>
    <main class="main">
        <h1 class="page-title mb-6">Add a User</h1>

        <p class="error-msg" th:if="${errorMsg != ''}" th:text="${errorMsg}"></p>

        <form method="post" action="/users/add" class="form">
            <div>
                <label for="name" class="label">First Name</label>
                <input id="name" type="text" name="name" th:value="${name}" required class="input w-80" />
            </div>
            <div>
                <label for="surname" class="label">Surname</label>
                <input id="surname" type="text" name="surname" th:value="${surname}" required class="input w-80" />
            </div>
            <div>
                <label for="skillLevel" class="label">Skill Level</label>
                <select id="skillLevel" name="skillLevel" class="select w-80">
                    <option value="">-- select --</option>
                    <option th:each="s : ${skillLevels}" th:value="${s.label}" th:text="${s.label}"
                            th:selected="${s.label == skillLevel}"></option>
                </select>
            </div>
            <div>
                <label for="preferredCuisine" class="label">Preferred Cuisine</label>
                <select id="preferredCuisine" name="preferredCuisine" class="select w-80">
                    <option value="">-- select --</option>
                    <option th:each="ct : ${cuisineTypes}" th:value="${ct.label}" th:text="${ct.label}"
                            th:selected="${ct.label == preferredCuisine}"></option>
                </select>
            </div>
            <button type="submit" class="btn mt-4">Save User</button>
        </form>
    </main>
</body>
</html>
