<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Recommendations')}"></head>
<body class="page-body">
    <aside th:replace="~{fragments/sidebar :: nav}"></aside>
    <main class="main">
        <h1 class="page-title mb-6">Recipe Recommendations</h1>

        <div th:if="${users.isEmpty()}">
            <p class="hint">No users found.
                <a href="/users/add" class="link">Add a user</a> first.
            </p>
        </div>

        <div th:if="${!users.isEmpty()}">
            <form method="post" action="/recommendations" class="inline-form mb-6">
                <label for="userId" class="inline-label">Select user:</label>
                <select id="userId" name="userId" class="select w-64">
                    <option th:each="u : ${users}"
                            th:value="${u.id}"
                            th:text="${u.name} + ' ' + ${u.surname} + ' (' + ${u.skillLevel} + ')'"
                            th:selected="${u.id == selectedUserId}">
                    </option>
                </select>
                <button type="submit" class="btn">Show</button>
            </form>

            <div th:if="${user != null}">
                <p class="muted mb-6">
                    Showing recommendations for
                    <strong th:text="${user.name} + ' ' + ${user.surname}"></strong>
                    (skill: <strong th:text="${user.skillLevel}"></strong>,
                    preferred cuisine: <strong th:text="${user.preferredCuisine}"></strong>).
                </p>

                <h2 class="section-title">
                    Matching skill level: <span th:text="${user.skillLevel}"></span>
                </h2>
                <p class="muted mb-3" th:if="${bySkill.isEmpty()}">No recipes found.</p>
                <table class="tbl mb-8" th:if="${!bySkill.isEmpty()}">
                    <thead>
                        <tr class="thead-row">
                            <th class="th">ID</th>
                            <th class="th">Title</th>
                            <th class="th">Cuisine 1</th>
                            <th class="th">Cuisine 2</th>
                            <th class="th">Difficulty</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r, stat : ${bySkill}">
                            <td class="td">
                                <a th:href="@{/recipes/{id}(id=${r.id})}" th:text="${r.id}" class="link"></a>
                            </td>
                            <td class="td" th:text="${r.title}"></td>
                            <td class="td" th:text="${r.cuisineType1}"></td>
                            <td class="td" th:text="${r.cuisineType2}"></td>
                            <td class="td" th:text="${r.difficulty}"></td>
                        </tr>
                    </tbody>
                </table>

                <h2 class="section-title">
                    Matching skill level AND cuisine: <span th:text="${user.preferredCuisine}"></span>
                </h2>
                <p class="muted mb-3" th:if="${bySkillAndCuisine.isEmpty()}">No recipes found.</p>
                <table class="tbl" th:if="${!bySkillAndCuisine.isEmpty()}">
                    <thead>
                        <tr class="thead-row">
                            <th class="th">ID</th>
                            <th class="th">Title</th>
                            <th class="th">Cuisine 1</th>
                            <th class="th">Cuisine 2</th>
                            <th class="th">Difficulty</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r, stat : ${bySkillAndCuisine}">
                            <td class="td">
                                <a th:href="@{/recipes/{id}(id=${r.id})}" th:text="${r.id}" class="link"></a>
                            </td>
                            <td class="td" th:text="${r.title}"></td>
                            <td class="td" th:text="${r.cuisineType1}"></td>
                            <td class="td" th:text="${r.cuisineType2}"></td>
                            <td class="td" th:text="${r.difficulty}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
